name: CD - Deploy to Server
on:
  push:
    branches: [ active ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        port: ${{ secrets.SSH_PORT }}
        script: |
          cd /var/www/html/inspire-lite/dev
          git fetch origin
          git show-ref --verify --quiet refs/heads/active || git checkout -b active origin/active
          git checkout active
          git config pull.rebase false
          git reset --hard origin/active
          git pull origin active
